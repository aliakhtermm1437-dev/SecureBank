# Strimzi-managed Kafka with mTLS + SASL/SCRAM + ACLs.
# Apply after Strimzi operator: https://strimzi.io/quickstarts/
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata: { name: securebank, namespace: securebank-data }
spec:
  kafka:
    version: 3.7.0
    replicas: 3
    listeners:
      - { name: internal, port: 9092, type: internal, tls: true,
          authentication: { type: scram-sha-512 } }
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: false
      inter.broker.protocol.version: "3.7"
    authorization:
      type: simple
      superUsers: [securebank-admin]
    storage:
      type: jbod
      volumes:
        - { id: 0, type: persistent-claim, size: 50Gi, deleteClaim: false }
  zookeeper:
    replicas: 3
    storage: { type: persistent-claim, size: 10Gi, deleteClaim: false }
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata: { name: tx.transfers.v1, namespace: securebank-data, labels: { strimzi.io/cluster: securebank } }
spec: { partitions: 6, replicas: 3, config: { min.insync.replicas: "2", retention.ms: "604800000" } }
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata: { name: tx.fraud_alerts.v1, namespace: securebank-data, labels: { strimzi.io/cluster: securebank } }
spec: { partitions: 6, replicas: 3, config: { min.insync.replicas: "2", retention.ms: "1209600000" } }
---
# Per-service KafkaUser w/ ACLs — least privilege.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata: { name: securebank-tx, namespace: securebank-data, labels: { strimzi.io/cluster: securebank } }
spec:
  authentication: { type: scram-sha-512 }
  authorization:
    type: simple
    acls:
      - { resource: { type: topic, name: tx.transfers.v1 }, operations: [Write, Describe] }
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata: { name: securebank-fraud, namespace: securebank-data, labels: { strimzi.io/cluster: securebank } }
spec:
  authentication: { type: scram-sha-512 }
  authorization:
    type: simple
    acls:
      - { resource: { type: topic, name: tx.transfers.v1 }, operations: [Read, Describe] }
      - { resource: { type: topic, name: tx.fraud_alerts.v1 }, operations: [Write, Describe] }
      - { resource: { type: group, name: fraud-detection-v1 }, operations: [Read] }
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata: { name: securebank-notif, namespace: securebank-data, labels: { strimzi.io/cluster: securebank } }
spec:
  authentication: { type: scram-sha-512 }
  authorization:
    type: simple
    acls:
      - { resource: { type: topic, name: tx.transfers.v1 }, operations: [Read, Describe] }
      - { resource: { type: topic, name: tx.fraud_alerts.v1 }, operations: [Read, Describe] }
      - { resource: { type: group, name: notification-v1-tx }, operations: [Read] }
      - { resource: { type: group, name: notification-v1-alerts }, operations: [Read] }
