apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata: { name: disallow-latest-tag }
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources: { kinds: [Pod] }
      validate:
        message: "Image tag ':latest' is forbidden — pin to a digest."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
