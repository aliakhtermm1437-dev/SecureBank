---
apiVersion: apps/v1
kind: Deployment
metadata: { name: account-service, namespace: securebank-app, labels: { app: account-service } }
spec:
  replicas: 2
  selector: { matchLabels: { app: account-service } }
  template:
    metadata:
      labels: { app: account-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "account-service"
    spec:
      serviceAccountName: account-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: account-service
          image: ghcr.io/securebank/account-service:1.0.0@sha256:REPLACE_AT_BUILD
          ports: [{ containerPort: 8002, name: http }]
          env:
            - name: SB_POSTGRES_DSN
              valueFrom: { secretKeyRef: { name: account-db, key: dsn } }
            - name: SB_REDIS_URL
              valueFrom: { secretKeyRef: { name: account-redis, key: url } }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          livenessProbe:  { httpGet: { path: /health, port: 8002 }, initialDelaySeconds: 10 }
          readinessProbe: { httpGet: { path: /ready,  port: 8002 }, initialDelaySeconds: 5 }
          volumeMounts: [{ name: tmp, mountPath: /tmp }]
      volumes:
        - { name: tmp, emptyDir: { medium: Memory, sizeLimit: 64Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: account-service, namespace: securebank-app }
spec:
  selector: { app: account-service }
  ports: [{ port: 8002, targetPort: 8002 }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: account-service, namespace: securebank-app }
spec: { minAvailable: 1, selector: { matchLabels: { app: account-service } } }
